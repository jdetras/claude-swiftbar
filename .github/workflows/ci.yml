name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type-check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check plugins/ tests/

      - name: Ruff format check
        run: ruff format --check plugins/ tests/

      - name: mypy type-check
        run: mypy plugins/claude-usage.5m.py --ignore-missing-imports --strict

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: bandit -r plugins/ -ll -ii

      - name: Check for hardcoded secrets
        run: |
          if grep -rn \
            -e 'sk-ant-' \
            -e 'Bearer sk-' \
            -e 'accessToken.*=.*"sk' \
            plugins/ tests/; then
            echo "Possible hardcoded secret detected!"
            exit 1
          fi
          echo "No hardcoded secrets found."

      - name: Verify no third-party imports
        run: |
          python3 - << 'PYEOF'
          import ast, sys, pathlib

          STDLIB_ALLOWED = {
              "__future__", "glob", "json", "os", "re", "stat", "subprocess", "tempfile",
              "time", "typing", "unicodedata", "urllib", "datetime", "sys", "types",
              "importlib", "pathlib",
              "pytest",   # test-only
          }

          src = pathlib.Path("plugins/claude-usage.5m.py").read_text()
          tree = ast.parse(src)
          violations = []
          for node in ast.walk(tree):
              if isinstance(node, (ast.Import, ast.ImportFrom)):
                  names = (
                      [alias.name for alias in node.names]
                      if isinstance(node, ast.Import)
                      else [node.module]
                  )
                  for name in names:
                      top = (name or "").split(".")[0]
                      if top and top not in STDLIB_ALLOWED:
                          violations.append(top)
          if violations:
              print("Third-party imports found:", violations)
              sys.exit(1)
          print("Import check passed — stdlib only.")
          PYEOF

      - name: Verify install.sh uses absolute tool paths
        run: |
          # Ensure bare 'security' is not called — must use /usr/bin/security via variable
          if grep -n '^\s*security ' install.sh; then
            echo "FAIL: bare 'security' command found in install.sh"
            exit 1
          fi
          echo "install.sh absolute path check passed."

      - name: Verify install.sh has no echo -e
        run: |
          if grep -n 'echo -e' install.sh; then
            echo "FAIL: echo -e found in install.sh"
            exit 1
          fi
          echo "install.sh echo -e check passed."

      - name: Shellcheck install.sh
        run: |
          if command -v shellcheck &>/dev/null; then
            shellcheck -S warning install.sh
          else
            echo "shellcheck not installed — skipping (install with: apt-get install shellcheck)"
          fi

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
