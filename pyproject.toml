[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "S"]
ignore = [
    "S603",  # subprocess call — intentional (security command only)
    "S404",  # subprocess import — intentional
    "S310",  # urllib.urlopen — HTTPS only, handled inline with nosec
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]  # assert is correct in pytest tests

[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.bandit]
skips = ["B603", "B404", "B310"]   # subprocess — intentional; B310: HTTPS only, URL is a compile-time constant
